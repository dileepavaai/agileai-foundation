<svg width="220" height="220" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">

  <style>
    .outer-ring {
      fill: none;
      stroke: #222222;
      stroke-width: 6;
    }

    .inner-ring {
      fill: none;
      stroke: #222222;
      stroke-width: 2;
    }

    .text-small {
      font-family: Arial, Helvetica, sans-serif;
      font-size: 18px;
      letter-spacing: 1.5px;
      fill: #222222;
      text-anchor: middle;
    }

    .text-medium {
      font-family: Arial, Helvetica, sans-serif;
      font-size: 20px;
      font-weight: 600;
      letter-spacing: 1px;
      fill: #222222;
      text-anchor: middle;
    }

    .text-large {
      font-family: Arial, Helvetica, sans-serif;
      font-size: 32px;
      font-weight: 700;
      fill: #222222;
      text-anchor: middle;
    }
  </style>

  <!-- Outer Circle -->
  <circle cx="200" cy="200" r="170" class="outer-ring"/>

  <!-- Inner Circle -->
  <circle cx="200" cy="200" r="150" class="inner-ring"/>

  <!-- Text Content -->
  <text x="200" y="120" class="text-small">
    AGILE AI FOUNDATION
  </text>

  <text x="200" y="155" class="text-medium">
    CANONICAL RELEASE
  </text>

  <text x="200" y="205" class="text-large">
    VERSION 1.1
  </text>

  <text x="200" y="245" class="text-medium">
    CONSTITUTIONALLY FROZEN
  </text>

  <text x="200" y="280" class="text-small">
    2026
  </text>

</svg>